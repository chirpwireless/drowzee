apiVersion: drowzee.challengr.io/v1beta1
kind: SleepSchedule
metadata:
  name: working-hours
spec:
  sleepTime: "10:00pm"
  wakeTime: "09:00am"
  dayOfWeek: "mon-fri"
  timezone: "Australia/Sydney"
  deployments:
    - name: dummy-service
  ingressName: dummy-service
---
apiVersion: drowzee.challengr.io/v1beta1
kind: SleepSchedule
metadata:
  name: every-day
spec:
  sleepTime: "10:00pm"
  wakeTime: "09:00am"
  dayOfWeek: "*"
  timezone: "Australia/Sydney"
  deployments:
    - name: service1
    - name: service1-worker
  cronjobs:
    - name: service1-backup
  ingressName: service1
---
apiVersion: drowzee.challengr.io/v1beta1
kind: SleepSchedule
metadata:
  name: 24h-format
spec:
  sleepTime: "22:00"
  wakeTime: "09:00"
  dayOfWeek: "*"
  timezone: "Australia/Sydney"
  deployments:
    - name: service2
    - name: service2-worker
  cronjobs:
    - name: service2-backup
  ingressName: service2
---
apiVersion: drowzee.challengr.io/v1beta1
kind: SleepSchedule
metadata:
  name: permanent-down
spec:
  sleepTime: "08:00pm"
  dayOfWeek: "*"
  # No wakeTime defined - resources will remain scaled down indefinitely
  timezone: "Australia/Sydney"
  deployments:
    - name: non-prod-service
  statefulsets:
    - name: non-prod-database
  cronjobs:
    - name: non-prod-backup
  ingressName: non-prod-service
---
apiVersion: drowzee.challengr.io/v1beta1
kind: SleepSchedule
metadata:
  name: priority-groups-example
spec:
  sleepTime: "22:00"
  wakeTime: "08:00"
  dayOfWeek: "mon-fri"
  timezone: "Australia/Sydney"
  priorityGroups:
    - name: database
      timeoutSeconds: 120
      waitForReady: true
    - name: app
      timeoutSeconds: 60
      waitForReady: true
    - name: background
      timeoutSeconds: 10
  deployments:
    - name: api-server
      priority: app
    - name: web-frontend
      priority: app
  statefulsets:
    - name: postgresql
      priority: database
  cronjobs:
    - name: cleanup-job
      priority: background
  ingressName: api-server
