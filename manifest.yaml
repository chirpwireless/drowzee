---
spec:
  scope: Namespaced
  group: drowzee.challengr.io
  names:
    kind: SleepSchedule
    plural: sleepschedules
    singular: sleepschedule
    shortNames:
      - ss
  versions:
    - name: v1beta1
      deprecated: false
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            status:
              type: object
              properties:
                hosts:
                  type: array
                  items:
                    type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      message:
                        type: string
                      status:
                        type: string
                        enum:
                          - 'True'
                          - 'False'
                      type:
                        type: string
                      lastHeartbeatTime:
                        type: string
                        format: date-time
                      lastTransitionTime:
                        type: string
                        format: date-time
                observedGeneration:
                  type: integer
            spec:
              type: object
              required:
                - sleepTime
                - wakeTime
                - timezone
                - deployments
              properties:
                enabled:
                  default: true
                  type: boolean
                  description: Whether the schedule is enabled
                needs:
                  type: array
                  description: List of other SleepSchedules that this schedule depends on. Dependencies will be woken up first during manual wake-up operations.
                  items:
                    type: object
                    required:
                      - name
                      - namespace
                    properties:
                      name:
                        type: string
                        description: Name of the dependency SleepSchedule
                      namespace:
                        type: string
                        description: Namespace of the dependency SleepSchedule
                timezone:
                  type: string
                  description: The timezone that the input times are based in
                deployments:
                  type: array
                  description: The deployments that will be slept/woken.
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                      priority:
                        type: string
                        description: Priority group name for this resource
                statefulsets:
                  type: array
                  description: The statefulsets that will be slept/woken.
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                      priority:
                        type: string
                        description: Priority group name for this resource
                cronjobs:
                  type: array
                  description: The cronjobs that will be suspended/resumed.
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                      priority:
                        type: string
                        description: Priority group name for this resource
                dayOfWeek:
                  type: string
                  description: The day of the week that the deployment will start sleeping
                ingressName:
                  type: string
                  description: The ingress that will be slept/woken.
                onDemand:
                  default: false
                  type: boolean
                  description: If true, the schedule will not automatically wake up at wakeTime but will still auto-sleep at sleepTime. Manual overrides are still auto-removed at scheduled times. If false (default), schedule works normally with auto-wake and auto-sleep.
                priorityGroups:
                  type: array
                  description: Ordered list of priority groups. Resources wake in this order, sleep in reverse.
                  items:
                    type: object
                    required:
                      - name
                      - timeoutSeconds
                    properties:
                      name:
                        type: string
                        description: Priority group name, referenced by resource priority field
                      timeoutSeconds:
                        type: integer
                        description: Fixed wait seconds (waitForReady=false) or max timeout seconds (waitForReady=true)
                        minimum: 0
                      waitForReady:
                        default: false
                        type: boolean
                        description: If true, poll resource readiness instead of fixed wait. timeoutSeconds becomes max timeout.
                sleepTime:
                  type: string
                  description: 'The time that the deployment will start sleeping (format: HH:MM for 24h or H:MMam/pm for 12h)'
                wakeTime:
                  type: string
                  description: 'The time that the deployment will wake up (format: HH:MM for 24h or H:MMam/pm for 12h)'
      additionalPrinterColumns:
        - name: Enabled
          type: boolean
          description: Enabled
          jsonPath: .spec.enabled
        - name: SleepTime
          type: string
          description: Starts Sleeping
          jsonPath: .spec.sleepTime
        - name: WakeTime
          type: string
          description: Wakes Up
          jsonPath: .spec.wakeTime
        - name: Timezone
          type: string
          description: Timezone
          jsonPath: .spec.timezone
        - name: Deployments
          type: string
          description: Deployments
          jsonPath: .spec.deployments[*].name
        - name: Statefulsets
          type: string
          description: Statefulsets
          jsonPath: .spec.statefulsets[*].name
        - name: Cronjobs
          type: string
          description: CronJobs
          jsonPath: .spec.cronjobs[*].name
        - name: Needs
          type: string
          description: Dependencies
          jsonPath: .spec.needs[*].name
        - name: OnDemand
          type: string
          description: On Demand
          jsonPath: .spec.onDemand
        - name: Sleeping?
          type: string
          description: Current Status
          jsonPath: .status.conditions[?(@.type == "Sleeping")].status
        - name: Transitioning?
          type: string
          description: Status Change In Progress
          jsonPath: .status.conditions[?(@.type == "Transitioning")].status
        - name: ManualOverride?
          type: string
          description: Status overridden by user
          jsonPath: .status.conditions[?(@.type == "ManualOverride")].status
      served: true
      deprecationWarning:
metadata:
  name: sleepschedules.drowzee.challengr.io
  labels:
    k8s-app: drowzee
kind: CustomResourceDefinition
apiVersion: apiextensions.k8s.io/v1

---
metadata:
  name: drowzee
  labels:
    k8s-app: drowzee
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
rules:
  - resources:
      - customresourcedefinitions
    apiGroups:
      - apiextensions.k8s.io
    verbs:
      - '*'
  - resources:
      - leases
    apiGroups:
      - coordination.k8s.io
    verbs:
      - '*'
  - resources:
      - sleepschedules
    apiGroups:
      - drowzee.challengr.io
    verbs:
      - '*'
  - resources:
      - sleepschedules/status
    apiGroups:
      - drowzee.challengr.io
    verbs:
      - '*'
  - resources:
      - events
    apiGroups:
      - events.k8s.io
    verbs:
      - '*'

---
metadata:
  name: drowzee
  labels:
    k8s-app: drowzee
  namespace: default
kind: ServiceAccount
apiVersion: v1

---
metadata:
  name: drowzee
  labels:
    k8s-app: drowzee
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
roleRef:
  name: drowzee
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
subjects:
  - name: drowzee
    kind: ServiceAccount
    namespace: default
